env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
name: Generate Neon Snake

on:
  schedule:
    - cron: "0 */6 * * *"   # har 6 soatda yangilanadi
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Snake generator
      - uses: Platane/snk@v3
        with:
          github_user_name: MurodovShohruh
          outputs: |
            dist/snake-neon.svg?color_snake=#00F7FF&color_dots=#001F3F,#003366,#004C99,#0066CC,#00AEEF

      # Step 2: GitHub Pages deploy
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
