env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
name: Neon Snake HARD + Maze

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: MurodovShohruh
          outputs: |
            dist/snake-neon-hard.svg?color_snake=#00F7FF&color_dots=#000814,#001D3D,#003566,#FFC300,#FFD60A

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
